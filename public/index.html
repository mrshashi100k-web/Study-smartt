<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>StudyFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="welcome">

<h1>StudyFlow</h1>

<p>Powered by DK</p>

<div class="loader"></div>

</div>

<div id="app">

<header>

<div id="date"></div>

<h3 id="motivation"></h3>

</header>

<section id="home" class="screen">

<div class="card" onclick="startQuiz('physics')">
Physics <span id="tick-physics">⬜</span>
</div>

<div class="card" onclick="startQuiz('chemistry')">
Chemistry <span id="tick-chemistry">⬜</span>
</div>

<div class="card" onclick="startQuiz('biology')">
Biology <span id="tick-biology">⬜</span>
</div>

<div id="quizBox"></div>

</section>

<section id="analysis" class="screen">

<h2>Quiz Analysis</h2>

<div id="analysisBox"></div>

</section>

<section id="notes" class="screen">

<input id="noteText" placeholder="Write note">

<input type="file" id="imgUpload">

<button onclick="saveNote()">Save</button>

<div id="notesList"></div>

</section>

<section id="help" class="screen">

<h2>Help</h2>

<a href="https://instagram.com/mr.divakar00">

@mr.divakar00

</a>

</section>

</div>

<nav>

<button onclick="show('home')">Home</button>

<button onclick="show('analysis')">Analysis</button>

<button onclick="show('notes')">Notes</button>

<button onclick="show('help')">Help</button>

</nav>

<script src="script.js"></script>

</body>
</html>
